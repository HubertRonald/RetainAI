[tox]
envlist = py310, lint
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Run unit tests
deps = -r requirements/test.txt
setenv = PYTHONPATH = {toxinidir}:{toxinidir}/src
commands = pytest

[testenv:lint]
description = Run formatting and lint checks
deps = -r requirements/dev.txt
setenv = PYTHONPATH = {toxinidir}:{toxinidir}/src
commands =
    black --check src modules tests
    isort --check-only src modules tests
    ruff check src modules tests

[testenv:format]
description = Format code
deps = -r requirements/dev.txt
setenv = PYTHONPATH = {toxinidir}:{toxinidir}/src
commands =
    black src modules tests
    isort src modules tests
    ruff check src modules tests --fix

[testenv:classification]
description = Validate classification dependencies and tests
deps =
    -r requirements/test.txt
    -r requirements/base.txt
setenv = PYTHONPATH = {toxinidir}:{toxinidir}/src
commands = pytest tests/unit/test_classification_modules.py

[testenv:survival]
description = Validate survival analysis dependencies and tests
deps =
    -r requirements/test.txt
    -r requirements/survival.txt
setenv = PYTHONPATH = {toxinidir}:{toxinidir}/src
commands =
    python -c "from lifelines import KaplanMeierFitter, CoxPHFitter; from lifelines.utils import concordance_index; print('lifelines OK')"
    pytest tests/unit/test_survival_modules.py

[testenv:explainability]
description = Validate explainability dependencies and tests
deps =
    -r requirements/test.txt
    -r requirements/explainability.txt
setenv = PYTHONPATH = {toxinidir}:{toxinidir}/src
commands =
    python -c "import shap; print('SHAP OK:', shap.__version__)"
    pytest tests/unit/test_explainability_modules.py

[testenv:behavior]
description = Run behavior tests
deps = -r requirements/test.txt
setenv = PYTHONPATH = {toxinidir}:{toxinidir}/src
commands = behave tests/behavior/features

[testenv:mlops]
description = Validate MLOps dependencies
deps = -r requirements/mlops.txt
setenv = PYTHONPATH = {toxinidir}:{toxinidir}/src
commands = python -c "import mlflow; print('MLflow OK:', mlflow.__version__)"

[testenv:api]
description = Validate API dependencies
deps = -r requirements/api.txt
setenv = PYTHONPATH = {toxinidir}:{toxinidir}/src
commands = python -c "import fastapi; print('FastAPI OK:', fastapi.__version__)"

[testenv:dashboard]
description = Validate dashboard dependencies
deps = -r requirements/dashboard.txt
setenv = PYTHONPATH = {toxinidir}:{toxinidir}/src
commands = python -c "import streamlit; print('Streamlit OK:', streamlit.__version__)"
