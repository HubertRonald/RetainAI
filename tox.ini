[tox]
envlist = py310, lint
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Run unit tests
deps =
    -r requirements/test.txt
commands =
    pytest

[testenv:lint]
description = Run formatting and lint checks
deps =
    -r requirements/dev.txt
commands =
    black --check src modules tests
    isort --check-only src modules tests
    ruff check src modules tests

[testenv:format]
description = Format code
deps =
    -r requirements/dev.txt
commands =
    black src modules tests
    isort src modules tests
    ruff check src modules tests --fix

[testenv:mlops]
description = Validate MLOps dependencies
deps =
    -r requirements/mlops.txt
commands =
    python -c "import mlflow; print('MLflow OK:', mlflow.__version__)"

[testenv:survival]
description = Validate survival analysis dependencies
deps =
    -r requirements/survival.txt
commands =
    python -c "from lifelines import KaplanMeierFitter, CoxPHFitter; from lifelines.utils import concordance_index; print('lifelines OK')"

[testenv:api]
description = Validate API dependencies
deps =
    -r requirements/api.txt
commands =
    python -c "import fastapi; print('FastAPI OK:', fastapi.__version__)"

[testenv:dashboard]
description = Validate dashboard dependencies
deps =
    -r requirements/dashboard.txt
commands =
    python -c "import streamlit; print('Streamlit OK:', streamlit.__version__)"